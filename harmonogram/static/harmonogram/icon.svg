<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Trash bin -->
  <!-- Lid handle -->
  <rect x="218" y="80" width="76" height="32" rx="14" fill="rgba(255,255,255,0.95)"/>
  <!-- Lid -->
  <rect x="135" y="105" width="242" height="38" rx="12" fill="white"/>
  <!-- Body -->
  <path d="M152,150 L170,400 Q173,418 190,418 L322,418 Q339,418 342,400 L360,150 Z" fill="rgba(255,255,255,0.92)"/>
  <!-- Bin vertical lines -->
  <line x1="215" y1="180" x2="219" y2="390" stroke="rgba(27,94,32,0.2)" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="180" x2="256" y2="390" stroke="rgba(27,94,32,0.2)" stroke-width="6" stroke-linecap="round"/>
  <line x1="297" y1="180" x2="293" y2="390" stroke="rgba(27,94,32,0.2)" stroke-width="6" stroke-linecap="round"/>

  <!-- Recycle symbol (three chasing arrows) -->
  <g transform="translate(256, 285)" fill="none" stroke="rgba(27,94,32,0.35)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arrow -->
    <path d="M-5,-65 L-30,-25"/>
    <path d="M5,-65 L30,-25"/>
    <polygon points="0,-75 -12,-55 12,-55" fill="rgba(27,94,32,0.35)" stroke="none"/>
    <!-- Bottom-left arrow -->
    <path d="M-30,-20 L-55,30"/>
    <path d="M-50,35 L5,35"/>
    <polygon points="-60,20 -45,42 -40,20" fill="rgba(27,94,32,0.35)" stroke="none"/>
    <!-- Bottom-right arrow -->
    <path d="M30,-20 L55,30"/>
    <path d="M50,35 L-5,35"/>
    <polygon points="60,20 45,42 40,20" fill="rgba(27,94,32,0.35)" stroke="none"/>
  </g>
</svg>
