<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Trash bin -->
  <!-- Lid handle -->
  <rect x="220" y="105" width="72" height="30" rx="12" fill="rgba(255,255,255,0.9)"/>
  <!-- Lid -->
  <rect x="145" y="128" width="222" height="35" rx="10" fill="white"/>
  <!-- Body -->
  <path d="M160,170 L175,390 Q178,405 193,405 L319,405 Q334,405 337,390 L352,170 Z" fill="rgba(255,255,255,0.9)"/>
  <!-- Bin lines -->
  <line x1="220" y1="195" x2="225" y2="380" stroke="rgba(27,94,32,0.25)" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="195" x2="256" y2="380" stroke="rgba(27,94,32,0.25)" stroke-width="5" stroke-linecap="round"/>
  <line x1="292" y1="195" x2="287" y2="380" stroke="rgba(27,94,32,0.25)" stroke-width="5" stroke-linecap="round"/>

  <!-- Recycle arrows -->
  <g transform="translate(256,290) scale(1.1)" fill="white" opacity="0.3">
    <!-- Top arrow -->
    <path d="M0,-45 L-12,-25 L-4,-25 L-4,-10 L4,-10 L4,-25 L12,-25 Z"/>
    <!-- Bottom-left arrow -->
    <path d="M-39,22 L-29,42 L-25,34 L-13,41 L-9,33 L-21,26 L-17,18 Z"/>
    <!-- Bottom-right arrow -->
    <path d="M39,22 L29,42 L25,34 L13,41 L9,33 L21,26 L17,18 Z"/>
  </g>

  <!-- Calendar badge -->
  <circle cx="395" cy="120" r="58" fill="white" stroke="rgba(0,0,0,0.08)" stroke-width="3"/>
  <rect x="355" y="82" width="80" height="28" rx="8" fill="#e53935"/>
  <text x="395" y="100" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold">PAM</text>
  <text x="395" y="148" text-anchor="middle" fill="#333" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="bold">2</text>
</svg>
