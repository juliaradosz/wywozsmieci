{% extends "harmonogram/base.html" %}
{% block title %}Usun wywoz{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto; text-align: center;">
    <div class="card-header" style="justify-content: center;">Potwierdzenie usuniecia</div>

    <p style="margin: 20px 0; font-size: 1.05em;">
        Czy na pewno chcesz usunac wywoz?
    </p>
    <p style="margin-bottom: 24px;">
        <strong>{{ wywoz.data|date:"d.m.Y" }}</strong> &mdash;
        <span class="badge badge-{{ wywoz.typ_odpadu }}">{{ wywoz.get_typ_odpadu_display }}</span>
    </p>

    <form method="post" style="display: flex; gap: 10px; justify-content: center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Tak, usun</button>
        <a href="{% url 'harmonogram' %}" class="btn btn-secondary">Anuluj</a>
    </form>
</div>
{% endblock %}
