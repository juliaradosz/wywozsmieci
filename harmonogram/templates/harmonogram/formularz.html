{% extends "harmonogram/base.html" %}
{% block title %}{{ tytul }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">{{ tytul }}</div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color: #d32f2f; font-size: 0.85em; margin-top: 4px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 24px;">
            <button type="submit" class="btn btn-primary" style="width:100%;">Zapisz</button>
            <a href="{% url 'harmonogram' %}" class="btn btn-secondary" style="width:100%; text-align:center;">Anuluj</a>
            {% if wywoz %}
            <a href="{% url 'usun' wywoz.pk %}" class="btn btn-danger" style="width:100%; text-align:center;">Usun ten wywoz</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
