{% extends "harmonogram/base.html" %}
{% block title %}{{ tytul }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <div class="card-header">{{ tytul }}</div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color: #d32f2f; font-size: 0.85em; margin-top: 4px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display: flex; gap: 10px; margin-top: 24px;">
            <button type="submit" class="btn btn-primary">Zapisz</button>
            <a href="{% url 'harmonogram' %}" class="btn btn-secondary">Anuluj</a>
            {% if wywoz %}
            <a href="{% url 'usun' wywoz.pk %}" class="btn btn-danger" style="margin-left: auto;">Usun</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
