<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1b5e20">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    {% load static %}
    <link rel="icon" type="image/svg+xml" href="{% static 'harmonogram/icon.svg' %}">
    <link rel="apple-touch-icon" href="{% static 'harmonogram/icon.svg' %}">
    <title>{% block title %}Wywoz Smieci{% endblock %} - Gmina Przodkowo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }

        .topbar {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: white;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-logo {
            font-size: 1.15em;
            font-weight: 800;
        }

        /* Bottom navigation for mobile */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 16px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #999;
            font-size: 0.7em;
            font-weight: 600;
            gap: 2px;
            padding: 4px 12px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .bottom-nav a .nav-icon { font-size: 1.8em; }
        .bottom-nav a.active { color: #1b5e20; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 12px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 12px;
        }
        .card-header {
            font-size: 1em;
            font-weight: 700;
            color: #1b5e20;
            margin-bottom: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }
        .btn-secondary:active { background: #e0e0e0; }
        .btn-danger {
            background: #ef5350;
            color: white;
        }
        .btn-sm { padding: 8px 14px; font-size: 0.85em; }
        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            font-size: 1em;
            border-radius: 10px;
            background: #f5f5f5;
            color: #666;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-icon:active { background: #e8e8e8; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.78em;
            color: white;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge-zmieszane { background: #212121; }
        .badge-opakowaniowe { background: #f9a825; color: #333; }
        .badge-papier { background: #1565c0; }
        .badge-szklo { background: #2e7d32; }
        .badge-biodegradowalne { background: #5d4037; }
        .badge-popiol { background: #bdbdbd; color: #333; }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            background: #fafafa;
            -webkit-appearance: none;
        }
        .form-input:focus { border-color: #2e7d32; outline: none; background: white; }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.9em;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-logo">&#9851; Wywoz Smieci</div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <nav class="bottom-nav">
        <a href="{% url 'harmonogram' %}" class="{% if request.resolver_match.url_name == 'harmonogram' %}active{% endif %}">
            <span class="nav-icon">&#128197;</span>
            Kalendarz
        </a>
        <a href="{% url 'lista' %}" class="{% if request.resolver_match.url_name == 'lista' %}active{% endif %}">
            <span class="nav-icon">&#128203;</span>
            Lista
        </a>
        <a href="{% url 'dodaj' %}" class="{% if request.resolver_match.url_name == 'dodaj' %}active{% endif %}">
            <span class="nav-icon">&#10133;</span>
            Dodaj
        </a>
    </nav>
</body>
</html>
